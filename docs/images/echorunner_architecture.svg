<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
<title id="title">EchoRunner System Architecture</title>
<desc id="desc">Python + Pygame orchestration with OpenAL spatial audio and local-first research telemetry</desc>
<defs>
<linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#061427"/><stop offset="1" stop-color="#0f2744"/></linearGradient>
<linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#132f52"/><stop offset="1" stop-color="#17476f"/></linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity="0.28"/></filter>
<marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#78dce8"/></marker>
</defs>
<rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
<text x="50" y="70" fill="#ffffff" font-size="36" font-family="Inter, Segoe UI, Arial" font-weight="800">EchoRunner System Architecture</text>
<text x="50" y="105" fill="#b9d8ff" font-size="18" font-family="Inter, Segoe UI, Arial">Python + Pygame orchestration with OpenAL spatial audio and local-first research telemetry</text>
<path d="M260,230.0 C295.0,230.0 295.0,230.0 330,230.0" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M540,230.0 C575.0,230.0 575.0,230.0 610,230.0" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M820,230.0 C855.0,230.0 855.0,230.0 890,230.0" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M1005.0,290 C725.0,290 725.0,390 445.0,390" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M1005.0,290 C860.0,290 860.0,390 715.0,390" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M820,230.0 C855.0,230.0 855.0,450.0 890,450.0" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<rect x="50" y="170" width="210" height="120" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="72" y="212" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Input Mapper</text>
<text x="72" y="242" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Keyboard, six-key mode, menu commands,</text>
<text x="72" y="264" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">scans, repeats</text>
<rect x="330" y="170" width="210" height="120" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="352" y="212" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Pygame Runtime</text>
<text x="352" y="242" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Window, clock, events, trainer mirror</text>
<text x="352" y="264" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">surface</text>
<rect x="610" y="170" width="210" height="120" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="632" y="212" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Simulation Core</text>
<text x="632" y="242" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Grid, orbs, enemies, power timers,</text>
<text x="632" y="264" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">deterministic frames</text>
<rect x="890" y="170" width="230" height="120" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="912" y="212" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Cue Planner</text>
<text x="912" y="242" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Threat priority, scan cues, route grammar,</text>
<text x="912" y="264" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">ducking intent</text>
<rect x="330" y="390" width="230" height="120" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="352" y="432" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">OpenAL Backend</text>
<text x="352" y="462" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Device, context, buffers, source pool,</text>
<text x="352" y="484" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">listener</text>
<rect x="610" y="390" width="210" height="120" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="632" y="432" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Speech Manager</text>
<text x="632" y="462" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Generated speech WAV prompts, repeat-last,</text>
<text x="632" y="484" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">interruption</text>
<rect x="890" y="390" width="230" height="120" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="912" y="432" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Research Export</text>
<text x="912" y="462" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Commands, events, cues, anonymized session</text>
<text x="912" y="484" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">summaries</text>
<text x="50" y="585" fill="#7fb3d8" font-size="14" font-family="Inter, Segoe UI, Arial">EchoRunner is sound-first: the visual trainer view mirrors the simulation, but gameplay decisions are carried by audio cues.</text>
</svg>