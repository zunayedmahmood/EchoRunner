<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620" role="img" aria-labelledby="title desc">
<title id="title">Blind-First Game Loop</title>
<desc id="desc">The player listens, infers, moves, scans, collects, survives, and clears each level</desc>
<defs>
<linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#061427"/><stop offset="1" stop-color="#0f2744"/></linearGradient>
<linearGradient id="card" x1="0" x2="1"><stop offset="0" stop-color="#132f52"/><stop offset="1" stop-color="#17476f"/></linearGradient>
<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#000" flood-opacity="0.28"/></filter>
<marker id="arrow" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#78dce8"/></marker>
</defs>
<rect width="100%" height="100%" rx="28" fill="url(#bg)"/>
<text x="50" y="70" fill="#ffffff" font-size="36" font-family="Inter, Segoe UI, Arial" font-weight="800">Blind-First Game Loop</text>
<text x="50" y="105" fill="#b9d8ff" font-size="18" font-family="Inter, Segoe UI, Arial">The player listens, infers, moves, scans, collects, survives, and clears each level</text>
<path d="M255,245.0 C285.0,245.0 285.0,245.0 315,245.0" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M505,245.0 C535.0,245.0 535.0,245.0 565,245.0" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M755,245.0 C785.0,245.0 785.0,245.0 815,245.0" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M940.0,300 C620.0,300 620.0,405 300.0,405" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M405,460.0 C445.0,460.0 445.0,460.0 485,460.0" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M695,460.0 C735.0,460.0 735.0,460.0 775,460.0" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<path d="M880.0,515 C520.0,515 520.0,190 160.0,190" fill="none" stroke="#78dce8" stroke-width="4" marker-end="url(#arrow)" opacity="0.9"/>
<rect x="65" y="190" width="190" height="110" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="87" y="232" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Listen</text>
<text x="87" y="262" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Steps, landmarks, junctions, enemy</text>
<text x="87" y="284" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">direction</text>
<rect x="315" y="190" width="190" height="110" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="337" y="232" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Decide</text>
<text x="337" y="262" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Choose route from local sound and memory</text>
<rect x="565" y="190" width="190" height="110" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="587" y="232" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Move</text>
<text x="587" y="262" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Arrow/WASD or six-key home-row movement</text>
<rect x="815" y="190" width="250" height="110" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="837" y="232" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Scan</text>
<text x="837" y="262" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Space for short scan, Shift+Space for deep</text>
<text x="837" y="284" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">scan</text>
<rect x="195" y="405" width="210" height="110" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="217" y="447" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Collect Orbs</text>
<text x="217" y="477" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Progress ticks and route-clear feedback</text>
<rect x="485" y="405" width="210" height="110" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="507" y="447" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Survive Threats</text>
<text x="507" y="477" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">Green/amber/red warnings and power reversal</text>
<rect x="775" y="405" width="210" height="110" rx="18" fill="url(#card)" stroke="#66e0ff" stroke-opacity="0.55" filter="url(#shadow)"/>
<text x="797" y="447" fill="#ffffff" font-size="22" font-family="Inter, Segoe UI, Arial" font-weight="800">Clear Level</text>
<text x="797" y="477" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">All orbs collected; export telemetry if in</text>
<text x="797" y="499" fill="#d9ecff" font-size="15" font-family="Inter, Segoe UI, Arial">study mode</text>
<text x="50" y="585" fill="#7fb3d8" font-size="14" font-family="Inter, Segoe UI, Arial">EchoRunner is sound-first: the visual trainer view mirrors the simulation, but gameplay decisions are carried by audio cues.</text>
</svg>